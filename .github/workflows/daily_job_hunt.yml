name: Daily Job Hunt — 9:30 AM IST

on:
  schedule:
    # 04:00 UTC = 09:30 IST  (UTC+5:30)
    - cron: "0 4 * * *"

  # Lets you click "Run workflow" in GitHub UI to test any time
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install groq requests feedparser

      - name: Run job hunter
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_CC:        ${{ secrets.EMAIL_CC }}
        run: python job_hunter.py

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-report-${{ github.run_number }}
          path: ~/job_reports/**/*.html
          retention-days: 30